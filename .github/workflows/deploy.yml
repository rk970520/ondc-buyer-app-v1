name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: REGISTRY,IMAGE_NAME
          script: |
            # Log in to GHCR on the server
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the latest image
            docker pull ${REGISTRY}/${IMAGE_NAME}:latest

            # Stop and remove existing container if running
            docker stop ondc-buyer-app 2>/dev/null || true
            docker rm ondc-buyer-app 2>/dev/null || true

            # Run the container on port 3080 (Apache will reverse-proxy to it)
            docker run -d \
              --name ondc-buyer-app \
              --restart unless-stopped \
              -p 3080:80 \
              ${REGISTRY}/${IMAGE_NAME}:latest

            # Set up Apache vhost for buyer.baniya.app if not already configured
            if [ ! -f /etc/apache2/sites-available/buyer.baniya.app.conf ]; then
              a2enmod proxy proxy_http 2>/dev/null || true

              cat > /etc/apache2/sites-available/buyer.baniya.app.conf << 'VHOST'
            <VirtualHost *:80>
                ServerName buyer.baniya.app
                ProxyPreserveHost On
                ProxyPass / http://127.0.0.1:3080/
                ProxyPassReverse / http://127.0.0.1:3080/
            </VirtualHost>
            VHOST

              a2ensite buyer.baniya.app.conf
              systemctl reload apache2
            fi

            # Clean up old images
            docker image prune -f
