server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Cache hashed static assets aggressively (Vite adds content hashes)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy - forward /api requests to the backend
    location /api/ {
        proxy_pass https://buyerapi.baniya.store;
        proxy_set_header Host buyerapi.baniya.store;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
        proxy_redirect http:// https://;
    }

    # Auth API proxy
    location /auth-api/ {
        rewrite ^/auth-api/(.*) /$1 break;
        proxy_pass https://identity.mobicloudit.com;
        proxy_set_header Host identity.mobicloudit.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
        proxy_redirect http:// https://;
    }

    # App API proxy
    location /app-api/ {
        rewrite ^/app-api/(.*) /$1 break;
        proxy_pass https://buyerapi.baniya.store;
        proxy_set_header Host buyerapi.baniya.store;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
        proxy_redirect http:// https://;
    }

    # SPA fallback - serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
